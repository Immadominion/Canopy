# Canopy Release — Example Workflow
#
# Triggered when a release tag is pushed (e.g. v1.2.3).
# Builds the release APK, runs pre-submission checks, and creates a Canopy release record.
# After this step passes, open the Canopy dashboard to submit to the dApp Store.
#
# Required secrets (Settings → Secrets and variables → Actions):
#   CANOPY_API_KEY  — from the Canopy dashboard Settings → API Keys
#
# Required variables (Settings → Secrets and variables → Variables):
#   CANOPY_APP_ID   — UUID from the Canopy dashboard (Settings → App Info)

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    name: Build, check, and register Canopy release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      # Build your APK here. Replace this with your actual Android build steps.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Build release APK
        run: ./gradlew assembleRelease

      # Run pre-submission checks and record the release in Canopy.
      - name: Canopy release
        id: canopy
        uses: canopy-dev/action-release@v1
        with:
          api-key: ${{ secrets.CANOPY_API_KEY }}
          app-id: ${{ vars.CANOPY_APP_ID }}
          apk-path: app/build/outputs/apk/release/app-release.apk
          # Strip the leading 'v' from the tag name for version-name.
          version-name: ${{ github.ref_name }}
          version-code: ${{ github.run_number }}
          release-notes: |
            ${{ github.ref_name }} — see CHANGELOG.md for details.
          # fail-on-check-failure defaults to true; set to false to record a failed release
          # without failing the workflow (not recommended for production releases).
          fail-on-check-failure: "true"

      - name: Print release info
        run: |
          echo "Release ID: ${{ steps.canopy.outputs.release-id }}"
          echo "Checks passed: ${{ steps.canopy.outputs.checks-passed }}"
          echo ""
          echo "Open the Canopy dashboard to submit to the dApp Store:"
          echo "  https://canopy.dev/dashboard/releases/${{ steps.canopy.outputs.release-id }}"
