# Canopy Beta Deploy — Example Workflow
#
# Triggered on every push to the `develop` branch.
# Builds the release APK, uploads it to Canopy, and creates a wallet-gated beta track.
#
# Required secrets (Settings → Secrets and variables → Actions):
#   CANOPY_API_KEY  — from the Canopy dashboard Settings → API Keys
#
# Required variables (Settings → Secrets and variables → Variables):
#   CANOPY_APP_ID   — UUID from the Canopy dashboard (Settings → App Info)

name: Beta Deploy

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  beta-deploy:
    name: Build and deploy to Canopy beta
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      # Build your APK here. Replace this with your actual Android build steps.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Build release APK
        run: ./gradlew assembleRelease

      # Deploy the signed APK to Canopy.
      - name: Deploy to Canopy beta
        id: canopy
        uses: canopy-dev/action-beta-deploy@v1
        with:
          api-key: ${{ secrets.CANOPY_API_KEY }}
          app-id: ${{ vars.CANOPY_APP_ID }}
          apk-path: app/build/outputs/apk/release/app-release.apk
          version-name: ${{ github.ref_name }}-${{ github.run_number }}
          version-code: ${{ github.run_number }}
          expires-in: "14"
          release-notes: |
            Automated build from branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Triggered by: ${{ github.actor }}

      # The track-id output can be used in subsequent steps, e.g. to post a Slack notification.
      - name: Print beta track info
        run: |
          echo "Beta track created: ${{ steps.canopy.outputs.track-id }}"
          echo "Expires at: ${{ steps.canopy.outputs.expires-at }}"
